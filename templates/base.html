<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Hybrid Sentiment & Psychological Analysis{% endblock %}</title>
    <!-- Modern Typography: Outfit & Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- FontAwesome for Premium Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Main Style -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    {% block head %}{% endblock %}
</head>
<body>
    <div class="glass-bg-container">
        <div class="glow-orb orb-1"></div>
        <div class="glow-orb orb-2"></div>
    </div>
    
    <header class="app-header">
        <div class="header-container">
            <div class="logo">
                <i class="fa-solid fa-brain-circuit brain-icon"></i>
                <span class="logo-text">Mind<span>Pulse</span></span>
            </div>
            <nav class="nav-links">
                <a href="{{ url_for('views.index') }}" class="nav-item active"><i class="fa-solid fa-chart-line"></i> Dashboard</a>
                <a href="#" class="nav-item"><i class="fa-solid fa-book-medical"></i> Documentation</a>
                <a href="#" class="nav-item"><i class="fa-solid fa-gear"></i> Settings</a>
            </nav>
        </div>
    </header>

    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

    <footer class="app-footer">
        <p>&copy; 2026 MindPulse Systems. A Hybrid Lexicon-RoBERTa + RAG Solution for Social Media Psychological Analysis.</p>
    </footer>

    {% block scripts %}{% endblock %}
</body>
</html>
